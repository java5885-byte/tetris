<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>테트리스</title>
<style>
  :root {
    --bg: #0f1020;
    --panel: #1a1c35;
    --grid: #23264a;
    --text: #e8e9ff;
    --accent: #6c7bff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .hidden { display: none !important; }
  html, body {
    height: 100%;
    background: radial-gradient(circle at 50% -10%, #2a6fc4 0%, #143f7d 38%, #0a234a 70%, #061634 100%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-user-select: none;
    user-select: none;
    overflow: hidden;
  }
  /* full-screen vertical layout: top stats / center board / bottom controls */
  #app {
    height: 100dvh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ---- TOP: score bar ---- */
  .topbar {
    flex: 0 0 auto;
    width: 100%;
    max-width: 640px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 6px 14px;
  }
  .stats { display: flex; gap: 10px; flex: 1; }
  .stat {
    background: var(--panel);
    border: 1px solid var(--grid);
    border-radius: 10px;
    padding: 6px 12px;
    flex: 1;
    text-align: center;
  }
  .stat h2 {
    font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
    color: #8a8db5; margin-bottom: 2px;
  }
  .stat .val { font-size: 20px; font-weight: 700; }
  .topright { display: flex; align-items: center; gap: 8px; }
  .nextbox {
    background: var(--panel);
    border: 1px solid var(--grid);
    border-radius: 10px;
    padding: 4px;
    display: flex; align-items: center; justify-content: center;
  }
  canvas#next { display: block; width: 48px; height: 48px; }
  .iconbtn {
    background: var(--panel);
    border: 1px solid var(--grid);
    color: var(--text);
    border-radius: 10px;
    width: 40px; height: 40px;
    font-size: 18px;
    cursor: pointer;
  }
  .iconbtn:active { transform: scale(.95); }

  /* ---- MIDDLE: game board ---- */
  .stage {
    flex: 1 1 auto;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    position: relative;
    min-height: 0;
    padding: 4px;
  }
  .board-wrap { position: relative; height: 100%; display: flex; align-items: center; }
  canvas#board {
    background: var(--panel);
    border: 2px solid var(--grid);
    border-radius: 10px;
    box-shadow: 0 10px 40px rgba(0,0,0,.5);
    touch-action: none;
    cursor: none;
    height: 100%;
    width: auto;
    aspect-ratio: 1 / 2;
    max-width: calc(100vw - 104px);
  }

  /* ---- LEFT: level progress gauge ---- */
  .gauge {
    height: 100%;
    width: 40px;
    background: #14162c;
    border: 1px solid var(--grid);
    border-radius: 22px;
    overflow: hidden;
    display: flex;
    align-items: flex-end;
    flex: 0 0 auto;
    box-shadow: inset 0 2px 6px rgba(0,0,0,.55);
  }
  .gauge-fill {
    width: 100%;
    height: 0%;
    /* convex golden cylinder: light sheen down the center */
    background: linear-gradient(to right,
      #8a5e0c 0%, #c8951a 22%, #ffe27a 46%, #fff6cf 52%,
      #ffd24d 60%, #c8951a 80%, #7e540a 100%);
    border-radius: 22px;
    box-shadow: inset 0 3px 5px rgba(255,255,255,.55),
                inset 0 -5px 8px rgba(0,0,0,.35);
    transition: height .3s ease;
  }
  .gauge.flash { animation: gaugeFlash .35s ease 3; }
  @keyframes gaugeFlash {
    0%, 100% { box-shadow: inset 0 2px 6px rgba(0,0,0,.55), 0 0 0 0 rgba(255,210,77,0); }
    50% { box-shadow: inset 0 2px 6px rgba(0,0,0,.55), 0 0 22px 7px rgba(255,210,77,.95); }
  }

  /* ---- RIGHT: golden stars ---- */
  .stars {
    height: 100%;
    width: 40px;
    display: flex;
    flex-direction: column-reverse;
    align-items: center;
    justify-content: space-between;
    padding: 4px 0;
    flex: 0 0 auto;
  }
  .stars .star {
    font-size: 32px;
    line-height: 1;
    color: #2a2d52;
    transition: color .25s, transform .25s, text-shadow .25s;
  }
  .stars .star.on {
    color: #ffd54f;
    text-shadow: 0 0 12px rgba(255,213,79,.9);
    transform: scale(1.2);
  }

  /* ---- BOTTOM: control pad (yellow hard-drop + arrow D-pad) ---- */
  .controls {
    flex: 0 0 auto;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6px 14px calc(8px + env(safe-area-inset-bottom));
  }
  .controls button {
    font-size: 32px;
    background: var(--panel);
    border: 1px solid var(--grid);
    border-radius: 12px;
    color: var(--text);
    cursor: pointer;
  }
  .controls button:active { background: var(--accent); }
  /* keypad: ▲ on top, ◀ ▼ ▶ across the middle, hard-drop square beside ▶ */
  .dpad {
    display: grid;
    grid-template-columns: repeat(4, 74px);
    grid-template-rows: repeat(2, 68px);
    gap: 7px;
  }
  .dpad button { width: 100%; height: 100%; }
  /* row1: ◀ 회전 ▶ ▼(soft) ; row2: 하드드롭 under the center rotate */
  .dpad .left   { grid-column: 1; grid-row: 1; }
  .dpad .rotate { grid-column: 2; grid-row: 1; }
  .dpad .right  { grid-column: 3; grid-row: 1; }
  .dpad .soft   { grid-column: 4; grid-row: 1; }
  /* square yellow hard-drop, directly below the center rotate key */
  .dpad .harddrop {
    grid-column: 2;
    grid-row: 2;
    background: linear-gradient(to bottom, #ffe27a, #f4b400);
    border: 1px solid #d99a00;
    color: #5a3e00;
    font-weight: 800;
    box-shadow: inset 0 2px 3px rgba(255,255,255,.6), 0 3px 6px rgba(0,0,0,.4);
  }
  .dpad .harddrop:active { background: linear-gradient(to bottom, #ffd24d, #e0a400); }

  /* ---- overlay ---- */
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(8,9,20,.85);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 16px;
    z-index: 10;
    text-align: center;
    padding: 24px;
    border-radius: 10px;
  }
  .overlay h1 { font-size: 30px; }
  .overlay p { color: #9498c4; max-width: 300px; line-height: 1.6; font-size: 14px; }
  .overlay.hidden { display: none; }

  /* ---- level-up banner (gold, blinking) ---- */
  .level-banner {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 6;
    opacity: 0;
  }
  .level-banner span {
    font-size: 46px;
    font-weight: 800;
    letter-spacing: 3px;
    color: #ffd24d;
    text-shadow: 0 0 20px rgba(255,210,77,.95), 0 0 40px rgba(255,170,0,.6), 0 2px 4px rgba(0,0,0,.6);
  }
  .level-banner.show { animation: lvlBlink 1.6s ease both; }
  @keyframes lvlBlink {
    0%   { opacity: 0; transform: scale(.6); }
    12%  { opacity: 1; transform: scale(1.12); }
    24%, 48%, 72% { opacity: 1; }
    36%, 60%, 84% { opacity: .12; }
    90%  { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.05); }
  }

  /* ---- combo banner (cyan, blinking, upper area) ---- */
  .combo-banner {
    position: absolute;
    left: 0; right: 0; top: 24%;
    display: flex;
    justify-content: center;
    pointer-events: none;
    z-index: 7;
    opacity: 0;
  }
  .combo-banner span {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 1px;
    white-space: nowrap;
    color: #7fe3ff;
    text-shadow: 0 0 16px rgba(127,227,255,.95), 0 0 34px rgba(60,180,255,.6), 0 2px 4px rgba(0,0,0,.6);
  }
  .combo-banner.show { animation: comboBlink 1.2s ease both; }
  @keyframes comboBlink {
    0%   { opacity: 0; transform: scale(.5); }
    14%  { opacity: 1; transform: scale(1.15); }
    30%, 60% { opacity: 1; }
    45%, 75% { opacity: .1; }
    88%  { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.05); }
  }

  /* ---- consecutive-clear streak banner (orange, lower) ---- */
  .streak-banner {
    position: absolute;
    left: 0; right: 0; top: 40%;
    display: flex; justify-content: center;
    pointer-events: none; z-index: 7; opacity: 0;
  }
  .streak-banner span {
    font-size: 28px; font-weight: 800; letter-spacing: 1px; white-space: nowrap;
    color: #ff9d4d;
    text-shadow: 0 0 16px rgba(255,140,40,.95), 0 0 34px rgba(255,90,0,.6), 0 2px 4px rgba(0,0,0,.6);
  }
  .streak-banner.show { animation: comboBlink 1.2s ease both; }

  /* ---- win screen ---- */
  .win-overlay { background: rgba(8,9,20,.94); }
  .win-overlay h1 { color: #ffd24d; text-shadow: 0 0 18px rgba(255,210,77,.7); }
  .win-overlay .big-star {
    font-size: 120px;
    line-height: 1;
    color: #ffd24d;
    text-shadow: 0 0 30px rgba(255,210,77,.95), 0 0 64px rgba(255,170,0,.6);
    animation: starPulse 1.3s ease-in-out infinite;
  }
  @keyframes starPulse {
    0%, 100% { transform: scale(1) rotate(0deg); }
    50% { transform: scale(1.18) rotate(10deg); }
  }

  /* ---- opponent mini board ---- */
  .opp {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    flex: 0 0 auto;
  }
  .opp-label { font-size: 11px; color: #9498c4; letter-spacing: 1px; }
  #oppBoard {
    background: #14162c;
    border: 2px solid var(--grid);
    border-radius: 8px;
    height: 70%;
    width: auto;
    aspect-ratio: 1 / 2;
  }
  .opp-status { font-size: 12px; font-weight: 700; color: #ffd24d; min-height: 16px; }

  /* ---- battle lobby ---- */
  .battle-overlay { gap: 12px; }
  .bsec { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%; }
  .battle-overlay .dim { color: #8a8db5; font-size: 13px; }
  .codebox {
    font-size: 30px; font-weight: 800; letter-spacing: 6px;
    color: #ffd24d; background: #14162c; border: 1px solid var(--grid);
    border-radius: 10px; padding: 10px 18px; user-select: all;
  }
  #bCodeInput {
    font-size: 24px; letter-spacing: 6px; text-align: center; text-transform: uppercase;
    width: 180px; padding: 10px; border-radius: 10px;
    border: 1px solid var(--grid); background: #14162c; color: var(--text);
  }
  .brow { display: flex; gap: 10px; }
  .btn.ghost { background: transparent; border: 1px solid var(--grid); }

  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 12px 22px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn:active { transform: scale(.97); }
</style>
</head>
<body>
  <div id="app">
    <!-- TOP: score / level / lines + next + controls -->
    <div class="topbar">
      <div class="stats">
        <div class="stat"><h2>점수</h2><div class="val" id="score">0</div></div>
        <div class="stat"><h2>레벨</h2><div class="val" id="level">1</div></div>
        <div class="stat"><h2>줄</h2><div class="val" id="lines">0</div></div>
      </div>
      <div class="topright">
        <div class="nextbox"><canvas id="next" width="96" height="96"></canvas></div>
        <button class="iconbtn" id="pauseBtn" title="일시정지">⏸</button>
        <button class="iconbtn" id="soundBtn" title="소리">🔊</button>
      </div>
    </div>

    <!-- MIDDLE: gauge + board + stars -->
    <div class="stage">
      <div class="opp hidden" id="oppPanel">
        <div class="opp-label">상대</div>
        <canvas id="oppBoard"></canvas>
        <div class="opp-status" id="oppStatus"></div>
      </div>
      <div class="gauge" id="gauge"><div class="gauge-fill" id="gaugeFill"></div></div>
      <div class="board-wrap">
        <canvas id="board"></canvas>
        <div class="combo-banner" id="comboBanner"><span>2 COMBO</span></div>
        <div class="streak-banner" id="streakBanner"><span>2연속</span></div>
        <div class="level-banner" id="levelBanner"><span>LEVEL 1</span></div>
        <div class="overlay" id="overlay">
          <h1>테트리스</h1>
          <p>블록을 쌓아 가로줄을 채우세요. 줄이 완성되면 사라집니다.</p>
          <button class="btn" id="startBtn">혼자 하기</button>
          <button class="btn" id="battleBtn" style="background:var(--grid);">⚔️ 배틀하기</button>
        </div>
        <div class="overlay battle-overlay hidden" id="battleOverlay">
          <h1>⚔️ 배틀</h1>
          <div class="bsec" id="bMenu">
            <p>친구와 1:1 대전! 한 명이 방을 만들고 코드를 공유하세요.</p>
            <button class="btn" id="bCreate">방 만들기</button>
            <button class="btn" id="bJoin" style="background:var(--grid);">방 참가</button>
          </div>
          <div class="bsec hidden" id="bHost">
            <p>방 코드 (상대에게 공유)</p>
            <div class="codebox" id="bCode">·····</div>
            <p class="dim" id="bHostStatus">상대 접속을 기다리는 중…</p>
          </div>
          <div class="bsec hidden" id="bJoinForm">
            <p>방 코드 입력</p>
            <input id="bCodeInput" maxlength="5" autocomplete="off" placeholder="ABCDE">
            <button class="btn" id="bConnect">접속</button>
            <p class="dim" id="bJoinStatus"></p>
          </div>
          <div class="bsec hidden" id="bChallenge">
            <p id="bChalMsg">상대가 도전했습니다!</p>
            <div class="brow">
              <button class="btn" id="bAccept">수락</button>
              <button class="btn" id="bDecline" style="background:var(--grid);">거절</button>
            </div>
          </div>
          <button class="btn ghost" id="bBack">← 뒤로</button>
        </div>
        <div class="overlay win-overlay hidden" id="winOverlay">
          <div class="big-star">★</div>
          <h1>미션 완료!</h1>
          <p>축하합니다 🎉<br>모든 레벨을 클리어했습니다!</p>
          <button class="btn" id="winRestartBtn">다시 시작</button>
        </div>
      </div>
      <div class="stars" id="stars"></div>
    </div>

    <!-- BOTTOM: control pad (keypad with hard-drop beside right) -->
    <div class="controls" id="touch">
      <div class="dpad">
        <button class="left" data-act="left">◀</button>
        <button class="rotate" data-act="rotate">⟳</button>
        <button class="right" data-act="right">▶</button>
        <button class="soft" data-act="down">▼</button>
        <button class="harddrop" data-act="drop">⤓</button>
      </div>
    </div>
  </div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
(function(){
  const COLS = 10, ROWS = 20, CELL = 30;
  const board = document.getElementById('board');
  board.width = COLS * CELL;
  board.height = ROWS * CELL;
  const ctx = board.getContext('2d');
  const nextCanvas = document.getElementById('next');
  const nctx = nextCanvas.getContext('2d');

  // ---- level progress gauge + golden stars (score-based) ----
  const gaugeEl = document.getElementById('gauge');
  const gaugeFillEl = document.getElementById('gaugeFill');
  const starsEl = document.getElementById('stars');
  const starEls = [];
  for(let i=0;i<10;i++){
    const s = document.createElement('div');
    s.className = 'star';
    s.textContent = '★';
    starsEl.appendChild(s);
    starEls.push(s);
  }
  const levelBannerEl = document.getElementById('levelBanner');
  const comboBannerEl = document.getElementById('comboBanner');
  let levelBaseScore = 0;              // score at the start of the current level
  // points needed to clear a level — 5000 per level (5000, 10000, ... 50000)
  function levelGoal(lv){ return 5000 * lv; }
  const MAX_LEVEL = 10;   // clearing level 10 wins the game
  let levelUpAnim = false;
  function showLevelBanner(){
    levelBannerEl.querySelector('span').textContent = 'LEVEL ' + level;
    levelBannerEl.classList.remove('show');
    void levelBannerEl.offsetWidth;    // reflow to restart the animation
    levelBannerEl.classList.add('show');
  }
  function showComboBanner(n, bonus){
    comboBannerEl.querySelector('span').textContent = n + ' COMBO +' + bonus.toLocaleString();
    comboBannerEl.classList.remove('show');
    void comboBannerEl.offsetWidth;
    comboBannerEl.classList.add('show');
  }
  const streakBannerEl = document.getElementById('streakBanner');
  let streak = 0;          // consecutive line-clearing placements (back-to-back)
  let prevClearBase = 0;   // base score of the previous clear in the current streak
  function showStreakBanner(n, bonus){
    streakBannerEl.querySelector('span').textContent = n + '연속 +' + bonus.toLocaleString();
    streakBannerEl.classList.remove('show');
    void streakBannerEl.offsetWidth;
    streakBannerEl.classList.add('show');
  }
  function updateProgress(){
    if(battle) return;                 // no gauge/stars in battle
    if(levelUpAnim) return;            // hold "full" display during level-up flash
    const prog = (score||0) - levelBaseScore;
    const pct = Math.max(0, Math.min(100, prog / levelGoal(level) * 100));
    gaugeFillEl.style.height = pct + '%';
    const filled = Math.min(10, (level||1) - 1);
    for(let i=0;i<10;i++) starEls[i].classList.toggle('on', i < filled);
  }
  // call after score changes; advances one level when the goal is reached
  function checkLevelUp(){
    if(battle){ updateStats(); return; }   // battle: no levels / gauge / stars
    if(score - levelBaseScore >= levelGoal(level)){
      level++;
      levelBaseScore = score;   // reset gauge to 0 (discard any leftover score)
      dropInterval = baseInterval(level);
      levelTimer = 0;
      updateStats();
      if(!battle && level > MAX_LEVEL){ winGame(); return; }   // solo: cleared level 10 → win
      levelUpEffect();
    } else {
      updateStats();
      updateProgress();
    }
  }
  const winOverlayEl = document.getElementById('winOverlay');
  function winGame(){
    running = false; gameOver = true;
    grid = newGrid();                  // clear the board
    particles = []; flash = 0; shake = 0; flashRows = []; flashRowTimer = 0;
    gaugeFillEl.style.height = '100%';
    starEls.forEach(s=> s.classList.add('on'));  // all 10 stars lit
    draw();
    SFX.levelup();
    winOverlayEl.classList.remove('hidden');
  }
  function levelUpEffect(){
    // reset the board + effects for the fresh level
    grid = newGrid();
    particles = []; flash = 0; shake = 0; acc = 0; flashRows = []; flashRowTimer = 0;
    // momentary full gauge + flash + sound + fill one more star, then settle
    levelUpAnim = true;
    gaugeFillEl.style.height = '100%';
    const filled = Math.min(10, level - 1);
    for(let i=0;i<10;i++) starEls[i].classList.toggle('on', i < filled);
    gaugeEl.classList.add('flash');
    SFX.levelup();
    showLevelBanner();          // big gold blinking "LEVEL N" in the center
    setTimeout(()=>{
      gaugeEl.classList.remove('flash');
      levelUpAnim = false;
      updateProgress();         // reset gauge to the new (near-empty) progress
    }, 750);
  }

  const COLORS = {
    I:'#9be7ff', O:'#ffe9a8', T:'#e0b3ff', S:'#b6e7b0',
    Z:'#ffb3b3', J:'#aec6ff', L:'#ffd1a3', G:'#8a90b0'
  };
  // darker shade per type for 3D bevel shadow
  const SHADE = {
    I:'#5bb4d6', O:'#d9b85e', T:'#a86fd1', S:'#79bf73',
    Z:'#d97373', J:'#6f8cd1', L:'#d99c5e', G:'#5a6080'
  };
  const SHAPES = {
    I:[[0,1],[1,1],[2,1],[3,1]],
    O:[[1,0],[2,0],[1,1],[2,1]],
    T:[[1,0],[0,1],[1,1],[2,1]],
    S:[[1,0],[2,0],[0,1],[1,1]],
    Z:[[0,0],[1,0],[1,1],[2,1]],
    J:[[0,0],[0,1],[1,1],[2,1]],
    L:[[2,0],[0,1],[1,1],[2,1]]
  };
  const TYPES = Object.keys(SHAPES);

  let grid, current, nextPiece, score, level, lines, gameOver, paused, running;
  let dropInterval, dropTimer, rafId, lastTime, acc;
  let levelTimer = 0;          // ms elapsed within current level
  const SPEEDUP_MS = 30000;    // every 30s
  const SPEEDUP_FACTOR = 0.9;  // 10% faster
  function baseInterval(lv){ return Math.max(80, 800 - (lv-1)*70); }
  let particles = [], flash = 0, shake = 0, soundOn = true;
  let flashRows = [], flashRowTimer = 0;   // rows blinking white before they clear

  // ---- Sound engine (Web Audio, no external files) ----
  let actx = null;
  function audio(){
    if(!actx){
      try { actx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch(e){ soundOn = false; }
    }
    if(actx && actx.state === 'suspended') actx.resume();
    return actx;
  }
  function tone(freq, dur, type, vol){
    if(!soundOn) return;
    const a = audio(); if(!a) return;
    const o = a.createOscillator(), g = a.createGain();
    o.type = type || 'square';
    o.frequency.value = freq;
    g.gain.setValueAtTime(0.0001, a.currentTime);
    g.gain.exponentialRampToValueAtTime(vol || 0.15, a.currentTime + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + dur);
    o.connect(g); g.connect(a.destination);
    o.start(); o.stop(a.currentTime + dur);
  }
  function chord(freqs, dur, type, vol){
    freqs.forEach((f,i)=> setTimeout(()=>tone(f, dur, type, vol), i*55));
  }
  const SFX = {
    move:   ()=> tone(220, 0.05, 'square', 0.08),
    rotate: ()=> tone(330, 0.06, 'square', 0.09),
    drop:   ()=> tone(120, 0.12, 'sawtooth', 0.12),
    land:   ()=> tone(160, 0.08, 'triangle', 0.1),
    clear1: ()=> chord([523,659,784], 0.18, 'square', 0.13),
    clear4: ()=> chord([523,659,784,1047,1319], 0.22, 'square', 0.16),
    over:   ()=> chord([392,330,262,196], 0.3, 'sawtooth', 0.14),
    levelup:()=> chord([523,659,784,1047,1319,1568], 0.22, 'triangle', 0.16),
    flashClear: ()=> { tone(1760, 0.05, 'sine', 0.16); tone(2349, 0.06, 'sine', 0.12); }  // bright white-blink
  };

  function newGrid(){
    return Array.from({length:ROWS}, ()=>Array(COLS).fill(null));
  }

  function makePiece(type){
    // store cells relative, compute rotation around center
    const cells = SHAPES[type].map(c=>({x:c[0], y:c[1]}));
    return { type, cells, x: 3, y: 0 };
  }

  // seeded RNG for fair battle piece order (same seed → same sequence for both players)
  function mulberry32(a){
    return function(){
      a |= 0; a = a + 0x6D2B79F5 | 0;
      let t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  let seededRng = null;   // set in battle, null in solo
  function rand(){ return seededRng ? seededRng() : Math.random(); }
  function randomType(){ return TYPES[Math.floor(rand()*TYPES.length)]; }

  function spawn(){
    current = nextPiece || makePiece(randomType());
    current.x = 3; current.y = 0;
    nextPiece = makePiece(randomType());
    drawNext();
    if(collides(current, 0, 0)){
      endGame();
    }
  }

  function collides(piece, dx, dy, cells){
    const cs = cells || piece.cells;
    for(const c of cs){
      const nx = piece.x + c.x + dx;
      const ny = piece.y + c.y + dy;
      if(nx < 0 || nx >= COLS || ny >= ROWS) return true;
      if(ny >= 0 && grid[ny][nx]) return true;
    }
    return false;
  }

  function rotate(piece){
    if(piece.type === 'O') return piece.cells;
    // rotate around pivot (cell index 1 for most; use bounding logic)
    // Use matrix rotation around center of bounding box for I, else around cell.
    const cells = piece.cells.map(c=>({x:c.x, y:c.y}));
    // pivot: use second cell as approx center
    let pivot;
    if(piece.type === 'I'){
      pivot = {x:1.5, y:1.5};
    } else {
      pivot = {x:1, y:1};
    }
    return cells.map(c=>({
      x: Math.round(pivot.x - (c.y - pivot.y)),
      y: Math.round(pivot.y + (c.x - pivot.x))
    }));
  }

  function tryRotate(){
    const rotated = rotate(current);
    // wall kicks
    for(const dx of [0,-1,1,-2,2]){
      if(!collides(current, dx, 0, rotated)){
        current.x += dx;
        current.cells = rotated;
        SFX.rotate();
        return;
      }
    }
  }

  function move(dx){
    if(!collides(current, dx, 0)){ current.x += dx; SFX.move(); }
  }

  function softDrop(){
    if(!collides(current, 0, 1)){
      current.y++;
      score += 1;
      updateStats();
    } else {
      lock();
    }
  }

  function hardDrop(){
    let d = 0;
    while(!collides(current, 0, d+1)) d++;
    current.y += d;
    score += d * 2;
    SFX.drop();
    lock();
  }

  function lock(){
    for(const c of current.cells){
      const nx = current.x + c.x, ny = current.y + c.y;
      if(ny < 0){ endGame(); return; }
      grid[ny][nx] = current.type;
    }
    SFX.land();
    clearLines();
    spawn();
  }

  function spawnParticles(rowY){
    for(let x=0; x<COLS; x++){
      const type = grid[rowY][x] || 'I';
      const col = COLORS[type];
      const cx = x*CELL + CELL/2, cy = rowY*CELL + CELL/2;
      const n = 5;
      for(let i=0;i<n;i++){
        particles.push({
          x: cx, y: cy,
          vx: (Math.random()-0.5)*5,
          vy: (Math.random()-0.5)*5 - 1,
          life: 1, color: col,
          size: 3 + Math.random()*4
        });
      }
    }
  }

  function clearLines(){
    if(flashRows.length) finishClear();   // resolve a still-pending blink first
    // find full rows first (for effects)
    const fullRows = [];
    for(let y=0; y<ROWS; y++){
      if(grid[y].every(cell => cell)) fullRows.push(y);
    }
    if(!fullRows.length){ streak = 0; prevClearBase = 0; return; }   // no clear breaks the streak

    const cleared = fullRows.length;

    // ---- white blink BEFORE the rows disappear ----
    flashRows = fullRows.slice();
    flashRowTimer = 150;          // ms the completed rows blink white before clearing
    flash = 1;                    // full-board white overlay
    SFX.flashClear();             // bright white-blink sound

    // multi-line combo: 2/3/4 lines at once → ×2 / ×4 / ×8
    streak += 1;
    const basePerLine = 100 * level;
    const comboMult = cleared >= 2 ? Math.pow(2, cleared - 1) : 1;   // 2x, 4x, 8x
    const thisBase = basePerLine * cleared * comboMult;

    // streak bonus: +10000 per consecutive clear (2연속 +10000, 3연속 +20000, 4연속 +30000 ...)
    const streakBonus = streak >= 2 ? (streak - 1) * 10000 : 0;

    // combo bonus (many lines at once): 2콤보 +10000, 3콤보 +20000, 4콤보 +40000
    const comboBonus = cleared >= 2 ? 10000 * Math.pow(2, cleared - 2) : 0;

    score += thisBase + streakBonus + comboBonus;
    lines += cleared;

    if(cleared >= 2) showComboBanner(cleared, comboBonus);  // "N COMBO +X"
    if(streak >= 2) showStreakBanner(streak, streakBonus);  // "N연속 +X"

    // BATTLE: send that many garbage lines to the opponent
    if(battle && conn && conn.open && cleared > 0){
      send({ t:'garbage', n: cleared });
    }

    updateStats();
    checkLevelUp();   // score-based: advances level + gauge/stars/flash/sound/banner
  }

  // remove the flashed rows after the white blink
  function finishClear(){
    if(!flashRows.length) return;
    flashRows.forEach(spawnParticles);
    shake = Math.min(flashRows.length * 4, 14);
    (flashRows.length >= 4 ? SFX.clear4 : SFX.clear1)();
    const rows = flashRows.slice().sort((a,b)=>a-b);
    for(const y of rows){
      grid.splice(y, 1);
      grid.unshift(Array(COLS).fill(null));
    }
    flashRows = [];
    flashRowTimer = 0;
  }

  function updateStats(){
    document.getElementById('score').textContent = score;
    document.getElementById('level').textContent = level;
    document.getElementById('lines').textContent = lines;
  }

  function drawCell(c, x, y, type, ghost){
    if(ghost){
      c.fillStyle = 'rgba(255,255,255,0.08)';
      c.fillRect(x*CELL+2, y*CELL+2, CELL-4, CELL-4);
      c.strokeStyle = 'rgba(255,255,255,0.18)';
      c.lineWidth = 1;
      c.strokeRect(x*CELL+2.5, y*CELL+2.5, CELL-5, CELL-5);
      return;
    }
    bevelCell(c, x*CELL, y*CELL, CELL, COLORS[type], SHADE[type]);
  }

  // draws a single 3D beveled block
  function bevelCell(c, px, py, size, col, shade){
    const b = Math.max(3, size*0.16); // bevel thickness
    const x0 = px+1, y0 = py+1, s = size-2;
    // base fill
    c.fillStyle = col;
    c.fillRect(x0, y0, s, s);
    // top highlight (trapezoid)
    c.fillStyle = 'rgba(255,255,255,0.55)';
    c.beginPath();
    c.moveTo(x0, y0); c.lineTo(x0+s, y0);
    c.lineTo(x0+s-b, y0+b); c.lineTo(x0+b, y0+b);
    c.closePath(); c.fill();
    // left highlight
    c.fillStyle = 'rgba(255,255,255,0.30)';
    c.beginPath();
    c.moveTo(x0, y0); c.lineTo(x0+b, y0+b);
    c.lineTo(x0+b, y0+s-b); c.lineTo(x0, y0+s);
    c.closePath(); c.fill();
    // bottom shadow
    c.fillStyle = shade;
    c.beginPath();
    c.moveTo(x0, y0+s); c.lineTo(x0+b, y0+s-b);
    c.lineTo(x0+s-b, y0+s-b); c.lineTo(x0+s, y0+s);
    c.closePath(); c.fill();
    // right shadow
    c.fillStyle = 'rgba(0,0,0,0.18)';
    c.beginPath();
    c.moveTo(x0+s, y0); c.lineTo(x0+s, y0+s);
    c.lineTo(x0+s-b, y0+s-b); c.lineTo(x0+s-b, y0+b);
    c.closePath(); c.fill();
    // inner face (slightly lighter center)
    c.fillStyle = col;
    c.fillRect(x0+b, y0+b, s-2*b, s-2*b);
    // ---- glossy sheen (top half) ----
    const ix = x0+b, iy = y0+b, iw = s-2*b, ih = s-2*b;
    const g = c.createLinearGradient(ix, iy, ix, iy+ih);
    g.addColorStop(0,   'rgba(255,255,255,0.5)');
    g.addColorStop(0.45,'rgba(255,255,255,0.12)');
    g.addColorStop(0.5, 'rgba(255,255,255,0.0)');
    c.fillStyle = g;
    c.fillRect(ix, iy, iw, ih*0.55);
    // bright corner glint
    c.fillStyle = 'rgba(255,255,255,0.55)';
    c.fillRect(ix+1, iy+1, Math.max(2, iw*0.28), Math.max(2, ih*0.18));
    // subtle outline
    c.strokeStyle = 'rgba(0,0,0,0.12)';
    c.lineWidth = 1;
    c.strokeRect(x0+0.5, y0+0.5, s-1, s-1);
  }

  function draw(){
    ctx.save();
    if(shake > 0){
      ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
    }
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--panel');
    ctx.fillRect(-20,-20,board.width+40,board.height+40);
    // grid lines
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    for(let x=0;x<=COLS;x++){ ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,board.height); ctx.stroke(); }
    for(let y=0;y<=ROWS;y++){ ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(board.width,y*CELL); ctx.stroke(); }
    // settled
    for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++)
      if(grid[y][x]) drawCell(ctx, x, y, grid[y][x]);
    // completed rows blink white before they clear
    if(flashRows.length){
      ctx.fillStyle = 'rgba(255,255,255,0.92)';
      for(const y of flashRows) ctx.fillRect(0, y*CELL, board.width, CELL);
    }
    if(current && !gameOver){
      // active
      for(const c of current.cells){
        const ny = current.y + c.y;
        if(ny >= 0) drawCell(ctx, current.x + c.x, ny, current.type);
      }
    }
    // particles
    for(const p of particles){
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    }
    ctx.globalAlpha = 1;
    // flash overlay
    if(flash > 0){
      ctx.fillStyle = 'rgba(255,255,255,' + (flash * 0.5) + ')';
      ctx.fillRect(0,0,board.width,board.height);
    }
    ctx.restore();
  }

  function drawNext(){
    nctx.clearRect(0,0,nextCanvas.width,nextCanvas.height);
    if(!nextPiece) return;
    const sz = 22, ox = 2, oy = 2;
    const xs = nextPiece.cells.map(c=>c.x), ys = nextPiece.cells.map(c=>c.y);
    const minX = Math.min(...xs), maxX = Math.max(...xs);
    const minY = Math.min(...ys), maxY = Math.max(...ys);
    const w = (maxX-minX+1)*sz, h = (maxY-minY+1)*sz;
    const px = (nextCanvas.width - w)/2, py = (nextCanvas.height - h)/2;
    for(const c of nextPiece.cells){
      bevelCell(nctx, px + (c.x-minX)*sz, py + (c.y-minY)*sz, sz,
                COLORS[nextPiece.type], SHADE[nextPiece.type]);
    }
  }

  function loop(time){
    if(!running) return;
    if(!lastTime) lastTime = time;
    const dt = time - lastTime;
    lastTime = time;
    if(!paused && !gameOver){
      // within-level speedup: every 30s, drop 10% faster
      levelTimer += dt;
      while(levelTimer >= SPEEDUP_MS){
        levelTimer -= SPEEDUP_MS;
        dropInterval = Math.max(40, dropInterval * SPEEDUP_FACTOR);
      }
      acc += dt;
      if(acc >= dropInterval){
        acc = 0;
        if(!collides(current, 0, 1)) current.y++;
        else lock();
      }
    }
    // update effects (run even when paused so they settle)
    const f = dt / 16.67;
    for(const p of particles){
      p.x += p.vx * f;
      p.y += p.vy * f;
      p.vy += 0.22 * f;
      p.life -= 0.025 * f;
    }
    particles = particles.filter(p => p.life > 0);
    if(flashRowTimer > 0){ flashRowTimer -= dt; if(flashRowTimer <= 0) finishClear(); }
    if(flash > 0) flash = Math.max(0, flash - 0.06 * f);
    if(shake > 0) shake = Math.max(0, shake - 0.6 * f);
    draw();
    if(battle) syncState();   // stream my board to the opponent (throttled)
    rafId = requestAnimationFrame(loop);
  }

  function startGame(){
    grid = newGrid();
    score = 0; level = 1; lines = 0; levelBaseScore = 0; streak = 0; prevClearBase = 0;
    gameOver = false; paused = false; running = true;
    dropInterval = baseInterval(1); acc = 0; lastTime = 0; levelTimer = 0;
    particles = []; flash = 0; shake = 0; flashRows = []; flashRowTimer = 0;
    audio();
    nextPiece = makePiece(randomType());
    spawn();
    updateStats();
    levelUpAnim = false;
    // gauge + golden stars only in solo mode (removed in battle)
    gaugeEl.classList.toggle('hidden', battle);
    starsEl.classList.toggle('hidden', battle);
    updateProgress();
    document.getElementById('overlay').classList.add('hidden');
    winOverlayEl.classList.add('hidden');
    document.getElementById('pauseBtn').textContent = '⏸';
    cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(loop);
  }

  function endGame(){
    if(battle){ loseBattle(); return; }   // battle: topping out = defeat
    gameOver = true; running = false;
    SFX.over();
    const ov = document.getElementById('overlay');
    ov.querySelector('h1').textContent = '게임 오버';
    ov.querySelector('p').textContent = '최종 점수: ' + score + ' (레벨 ' + level + ')';
    ov.classList.remove('hidden');
  }

  function togglePause(){
    if(gameOver || !running) return;
    paused = !paused;
    document.getElementById('pauseBtn').textContent = paused ? '▶' : '⏸';
    if(paused){
      ctx.fillStyle = 'rgba(8,9,20,.7)';
      ctx.fillRect(0,0,board.width,board.height);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 28px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('일시정지', board.width/2, board.height/2);
    }
  }

  document.addEventListener('keydown', e=>{
    if(!running || gameOver) return;
    if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
    if(paused && e.key.toLowerCase() !== 'p') return;
    switch(e.key){
      case 'ArrowLeft': move(-1); break;
      case 'ArrowRight': move(1); break;
      case 'ArrowUp': tryRotate(); break;
      case 'ArrowDown': softDrop(); break;
      case ' ': hardDrop(); break;
      case 'p': case 'P': togglePause(); break;
    }
  });

  document.getElementById('touch').addEventListener('click', e=>{
    const act = e.target.dataset.act;
    if(!act || !running || gameOver || paused) return;
    if(act==='left') move(-1);
    else if(act==='right') move(1);
    else if(act==='rotate') tryRotate();
    else if(act==='down') softDrop();
    else if(act==='drop') hardDrop();
  });

  // ---- rotate by tapping/clicking the board ----
  let lastTouch = 0;
  let touchStart = null;
  board.addEventListener('touchstart', e=>{
    if(!running) return;
    lastTouch = Date.now();
    touchStart = {x:e.touches[0].clientX, y:e.touches[0].clientY, t:Date.now()};
  }, {passive:true});
  board.addEventListener('touchend', e=>{
    lastTouch = Date.now();
    if(!touchStart || !running || gameOver || paused){ touchStart = null; return; }
    const dx = e.changedTouches[0].clientX - touchStart.x;
    const dy = e.changedTouches[0].clientY - touchStart.y;
    const adx = Math.abs(dx), ady = Math.abs(dy);
    if(adx < 14 && ady < 14){ hardDrop(); }         // tap = hard drop
    else if(adx > ady){ move(dx>0?1:-1); }          // horizontal swipe = move
    else if(dy > 0){ softDrop(); }                  // swipe down = soft drop
    touchStart = null;
  }, {passive:true});
  // desktop: click board to hard drop (ignore the synthetic click after a touch)
  board.addEventListener('click', ()=>{
    if(Date.now() - lastTouch < 600) return;
    if(running && !gameOver && !paused) hardDrop();
  });

  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('winRestartBtn').addEventListener('click', startGame);
  document.getElementById('pauseBtn').addEventListener('click', togglePause);
  document.getElementById('soundBtn').addEventListener('click', e=>{
    soundOn = !soundOn;
    if(soundOn){ audio(); SFX.rotate(); }
    e.target.textContent = soundOn ? '🔊' : '🔇';
  });

  // =====================================================================
  //  BATTLE MODE (P2P via PeerJS / WebRTC)
  // =====================================================================
  let battle = false, isHost = false, peer = null, conn = null;
  const ID_PREFIX = 'tetbtl-';
  const oppPanel = document.getElementById('oppPanel');
  const oppBoard = document.getElementById('oppBoard');
  const octx = oppBoard.getContext('2d');
  const oppStatusEl = document.getElementById('oppStatus');
  const OPP_CELL = 14;
  oppBoard.width = COLS * OPP_CELL;
  oppBoard.height = ROWS * OPP_CELL;
  let oppState = null;

  const battleOverlay = document.getElementById('battleOverlay');
  const bMenu = document.getElementById('bMenu');
  const bHost = document.getElementById('bHost');
  const bJoinForm = document.getElementById('bJoinForm');
  const bChallenge = document.getElementById('bChallenge');
  const bCodeEl = document.getElementById('bCode');
  const bCodeInput = document.getElementById('bCodeInput');

  function showSec(el){
    [bMenu,bHost,bJoinForm,bChallenge].forEach(s=> s.classList.add('hidden'));
    if(el) el.classList.remove('hidden');
  }
  function send(obj){ try { if(conn && conn.open) conn.send(obj); } catch(e){} }

  function makeCode(){
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let s = '';
    for(let i=0;i<5;i++) s += chars[Math.floor(Math.random()*chars.length)];
    return s;
  }

  // ---- board serialization for live opponent view ----
  function serializeGrid(){
    let s = '';
    for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++) s += (grid[y][x] || '.');
    return s;
  }
  function serializePiece(){
    if(!current) return null;
    return { t: current.type, x: current.x, y: current.y, c: current.cells };
  }
  let lastSync = 0;
  function syncState(force){
    if(!battle || !conn || !conn.open) return;
    const now = performance.now();
    if(!force && now - lastSync < 70) return;
    lastSync = now;
    send({ t:'state', g: serializeGrid(), p: serializePiece(), o: gameOver });
  }

  function renderOpp(){
    octx.fillStyle = '#14162c';
    octx.fillRect(0,0,oppBoard.width,oppBoard.height);
    if(!oppState){ return; }
    const g = oppState.g;
    for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++){
      const ch = g[y*COLS+x];
      if(ch && ch !== '.'){
        octx.fillStyle = COLORS[ch] || '#888';
        octx.fillRect(x*OPP_CELL+1, y*OPP_CELL+1, OPP_CELL-2, OPP_CELL-2);
      }
    }
    const p = oppState.p;
    if(p){
      octx.fillStyle = COLORS[p.t] || '#fff';
      for(const c of p.c){
        const nx = p.x + c.x, ny = p.y + c.y;
        if(ny >= 0) octx.fillRect(nx*OPP_CELL+1, ny*OPP_CELL+1, OPP_CELL-2, OPP_CELL-2);
      }
    }
  }

  // ---- garbage lines pushed up from the bottom ----
  function addGarbage(n){
    if(!running || gameOver) return;
    if(flashRows.length) finishClear();   // resolve any pending line-clear first
    for(let k=0;k<n;k++){
      if(grid[0].some(c=>c)){ loseBattle(); return; }   // overflow = defeat
      grid.shift();
      const row = Array(COLS).fill('G');
      row[Math.floor(rand()*COLS)] = null;              // one open column
      grid.push(row);
    }
    if(current){ let guard=0; while(collides(current,0,0) && current.y>-2 && guard++<25) current.y--; }
    shake = Math.max(shake, Math.min(n*3, 12));
    syncState(true);
  }

  // ---- battle results ----
  function showBattleResult(win){
    running = false; gameOver = true;
    oppPanel.classList.add('hidden');
    const ov = document.getElementById('overlay');
    ov.querySelector('h1').textContent = win ? '승리! 🏆' : '패배 😢';
    ov.querySelector('p').textContent  = win ? '상대를 이겼습니다!' : '게임 오버 — 다음엔 이겨봐요!';
    ov.classList.remove('hidden');
    win ? SFX.levelup() : SFX.over();
    battle = false; seededRng = null;
    closePeer();
  }
  function loseBattle(){
    if(gameOver) return;
    send({ t:'over' });
    showBattleResult(false);
  }
  function winBattle(){
    if(gameOver && !battle) return;
    showBattleResult(true);
  }

  function startBattle(seed, host){
    battle = true; isHost = host; oppState = null; oppGameOverShown = false;
    seededRng = mulberry32((seed >>> 0) || 1);
    battleOverlay.classList.add('hidden');
    document.getElementById('overlay').classList.add('hidden');
    oppPanel.classList.remove('hidden');
    oppStatusEl.textContent = '';
    renderOpp();
    startGame();          // resets + starts; randomType now uses the shared seed
    syncState(true);
  }
  let oppGameOverShown = false;

  // ---- message routing ----
  function onMessage(m){
    if(!m || !m.t) return;
    if(m.t === 'challenge'){            // host receives a challenger
      document.getElementById('bChalMsg').textContent = '상대가 도전했습니다! 수락하시겠어요?';
      showSec(bChallenge);
    } else if(m.t === 'start'){         // guest receives go signal
      startBattle(m.seed, false);
    } else if(m.t === 'state'){
      oppState = m; renderOpp();
      if(m.o && !oppGameOverShown){ oppGameOverShown = true; }
    } else if(m.t === 'garbage'){
      addGarbage(m.n);
    } else if(m.t === 'over'){          // opponent topped out → I win
      if(battle) winBattle();
    } else if(m.t === 'decline'){
      setJoinStatus('상대가 거절했습니다.');
    }
  }
  function setJoinStatus(t){ document.getElementById('bJoinStatus').textContent = t; }
  function setHostStatus(t){ document.getElementById('bHostStatus').textContent = t; }

  function bindConn(c){
    conn = c;
    conn.on('data', onMessage);
    conn.on('close', ()=>{
      if(battle && !gameOver){ oppStatusEl.textContent = '연결 끊김'; winBattle(); }
    });
    conn.on('error', ()=>{});
  }

  function closePeer(){
    try { if(conn) conn.close(); } catch(e){}
    try { if(peer) peer.destroy(); } catch(e){}
    conn = null; peer = null;
  }

  // ---- host: create a room ----
  function createRoom(){
    if(typeof Peer === 'undefined'){ setHostStatus('네트워크 라이브러리 로드 실패'); showSec(bHost); return; }
    showSec(bHost);
    bCodeEl.textContent = '·····';
    setHostStatus('방 생성 중…');
    const code = makeCode();
    closePeer();
    peer = new Peer(ID_PREFIX + code);
    peer.on('open', ()=>{
      bCodeEl.textContent = code;
      setHostStatus('상대 접속을 기다리는 중…');
    });
    peer.on('connection', c=>{
      bindConn(c);
      c.on('open', ()=> setHostStatus('상대 접속됨 — 도전 대기 중…'));
    });
    peer.on('error', err=>{
      if(err && err.type === 'unavailable-id'){ createRoom(); }   // code taken, retry
      else setHostStatus('오류: ' + (err && err.type || '연결 실패'));
    });
  }

  // ---- guest: join a room ----
  function joinRoom(){
    const code = (bCodeInput.value || '').trim().toUpperCase();
    if(code.length < 4){ setJoinStatus('코드를 입력하세요.'); return; }
    if(typeof Peer === 'undefined'){ setJoinStatus('네트워크 라이브러리 로드 실패'); return; }
    setJoinStatus('접속 중…');
    closePeer();
    peer = new Peer();
    peer.on('open', ()=>{
      const c = peer.connect(ID_PREFIX + code, { reliable:true });
      bindConn(c);
      c.on('open', ()=>{ send({ t:'challenge' }); setJoinStatus('수락 대기 중…'); });
    });
    peer.on('error', ()=> setJoinStatus('접속 실패 — 코드를 확인하세요.'));
  }

  function acceptChallenge(){
    const seed = (Math.random()*0xffffffff) >>> 0;
    send({ t:'start', seed });
    startBattle(seed, true);
  }
  function declineChallenge(){
    send({ t:'decline' });
    setHostStatus('상대 접속을 기다리는 중…');
    showSec(bHost);
  }

  // ---- lobby button wiring ----
  document.getElementById('battleBtn').addEventListener('click', ()=>{
    document.getElementById('overlay').classList.add('hidden');
    battleOverlay.classList.remove('hidden');
    showSec(bMenu);
  });
  document.getElementById('bCreate').addEventListener('click', createRoom);
  document.getElementById('bJoin').addEventListener('click', ()=>{ showSec(bJoinForm); setJoinStatus(''); });
  document.getElementById('bConnect').addEventListener('click', joinRoom);
  document.getElementById('bAccept').addEventListener('click', acceptChallenge);
  document.getElementById('bDecline').addEventListener('click', declineChallenge);
  document.getElementById('bBack').addEventListener('click', ()=>{
    closePeer();
    battleOverlay.classList.add('hidden');
    document.getElementById('overlay').classList.remove('hidden');
  });

  // initial idle render
  grid = newGrid();
  draw();
})();
</script>
</body>
</html>
